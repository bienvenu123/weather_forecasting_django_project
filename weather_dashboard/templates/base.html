<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Kigali Weather Dashboard{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-rc4/dist/css/adminlte.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --app-bg: #eef4f3;
            --app-ink: #14201f;
            --app-muted: #657573;
            --app-panel: rgba(255, 255, 255, .84);
            --app-panel-strong: #ffffff;
            --app-line: rgba(20, 32, 31, .11);
            --app-green: #0f9f7a;
            --app-green-dark: #08735e;
            --app-coral: #ef6f61;
            --app-gold: #f2b84b;
            --app-blue: #3478f6;
            --shadow-soft: 0 18px 52px rgba(26, 44, 42, .12);
            --shadow-lift: 0 22px 65px rgba(26, 44, 42, .18);
        }

        * { letter-spacing: 0; }
        html { scroll-behavior: smooth; }
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 16% -8%, rgba(239, 111, 97, .20), transparent 26rem),
                radial-gradient(circle at 88% 8%, rgba(15, 159, 122, .18), transparent 29rem),
                linear-gradient(135deg, #f8fbfa 0%, var(--app-bg) 48%, #f6f0e6 100%);
            color: var(--app-ink);
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        a { color: var(--app-green-dark); }
        .app-shell { min-height: 100vh; }
        .app-navbar {
            position: sticky;
            top: 0;
            z-index: 1040;
            border-bottom: 1px solid rgba(255, 255, 255, .62);
            background: rgba(248, 251, 250, .78);
            backdrop-filter: blur(18px);
        }
        .brand-mark {
            display: inline-grid;
            width: 40px;
            height: 40px;
            place-items: center;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--app-green), #45c5a8);
            color: white;
            box-shadow: 0 10px 28px rgba(15, 159, 122, .25);
        }
        .navbar-brand {
            align-items: center;
            color: var(--app-ink);
            display: inline-flex;
            font-weight: 800;
            gap: .65rem;
        }
        .brand-copy small {
            color: var(--app-muted);
            display: block;
            font-size: .72rem;
            font-weight: 600;
            line-height: 1;
        }
        .nav-link {
            border-radius: 999px;
            color: #43514f;
            font-size: .94rem;
            font-weight: 650;
            padding: .55rem .85rem !important;
            transition: background .18s ease, color .18s ease, transform .18s ease;
        }
        .nav-link:hover {
            background: rgba(15, 159, 122, .10);
            color: var(--app-green-dark);
            transform: translateY(-1px);
        }
        .nav-link.active {
            background: #16312e;
            color: #fff !important;
            box-shadow: 0 12px 30px rgba(22, 49, 46, .18);
        }
        .navbar-toggler {
            border: 1px solid var(--app-line);
            border-radius: 8px;
        }

        .content-area {
            margin: 0 auto;
            max-width: 1440px;
            padding: 28px;
        }
        .page-hero {
            border: 1px solid rgba(255, 255, 255, .68);
            border-radius: 8px;
            box-shadow: var(--shadow-soft);
            color: #fff;
            margin-bottom: 22px;
            overflow: hidden;
            position: relative;
            background:
                linear-gradient(112deg, rgba(18, 40, 38, .95), rgba(17, 91, 77, .80) 48%, rgba(239, 111, 97, .72)),
                url("https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1800&q=80") center/cover;
        }
        .page-hero::after {
            background-image:
                linear-gradient(rgba(255, 255, 255, .08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, .08) 1px, transparent 1px);
            background-size: 42px 42px;
            content: "";
            inset: 0;
            opacity: .24;
            pointer-events: none;
            position: absolute;
        }
        .hero-inner {
            min-height: 260px;
            padding: clamp(26px, 5vw, 54px);
            position: relative;
            z-index: 1;
        }
        .eyebrow {
            align-items: center;
            color: rgba(255, 255, 255, .82);
            display: inline-flex;
            font-size: .78rem;
            font-weight: 800;
            gap: .45rem;
            text-transform: uppercase;
        }
        .hero-title {
            font-size: clamp(2rem, 4vw, 4.45rem);
            font-weight: 800;
            line-height: .98;
            margin: .75rem 0 1rem;
            max-width: 820px;
        }
        .hero-copy {
            color: rgba(255, 255, 255, .84);
            font-size: clamp(1rem, 1.8vw, 1.2rem);
            margin: 0;
            max-width: 680px;
        }
        .hero-actions, .toolbar-actions {
            display: flex;
            flex-wrap: wrap;
            gap: .7rem;
        }

        .btn {
            border-radius: 8px;
            font-weight: 750;
            min-height: 40px;
        }
        .btn-primary {
            background: var(--app-green);
            border-color: var(--app-green);
            box-shadow: 0 14px 30px rgba(15, 159, 122, .22);
        }
        .btn-primary:hover, .btn-primary:focus {
            background: var(--app-green-dark);
            border-color: var(--app-green-dark);
        }
        .btn-outline-secondary {
            border-color: rgba(20, 32, 31, .18);
            color: #33423f;
        }
        .btn-light {
            color: #173531;
        }
        .btn-icon {
            align-items: center;
            display: inline-flex;
            gap: .45rem;
            justify-content: center;
        }

        .panel, .card {
            background: var(--app-panel);
            border: 1px solid rgba(255, 255, 255, .76);
            border-radius: 8px;
            box-shadow: var(--shadow-soft);
            overflow: hidden;
        }
        .card-header {
            align-items: center;
            background: rgba(255, 255, 255, .56);
            border-bottom: 1px solid var(--app-line);
            display: flex;
            justify-content: space-between;
            min-height: 58px;
        }
        .card-title {
            color: #20312f;
            font-size: 1rem;
            font-weight: 800;
            margin: 0;
        }
        .metric-card {
            isolation: isolate;
            min-height: 162px;
            position: relative;
            transition: transform .2s ease, box-shadow .2s ease;
        }
        .metric-card::before {
            background: linear-gradient(135deg, var(--metric-color, var(--app-green)), transparent 72%);
            content: "";
            inset: 0 auto 0 0;
            opacity: .14;
            position: absolute;
            width: 48%;
            z-index: -1;
        }
        .metric-card:hover {
            box-shadow: var(--shadow-lift);
            transform: translateY(-4px);
        }
        .metric-icon {
            align-items: center;
            background: color-mix(in srgb, var(--metric-color, var(--app-green)) 15%, white);
            border: 1px solid color-mix(in srgb, var(--metric-color, var(--app-green)) 24%, white);
            border-radius: 8px;
            color: var(--metric-color, var(--app-green));
            display: inline-flex;
            height: 42px;
            justify-content: center;
            width: 42px;
        }
        .metric {
            color: #122321;
            font-size: clamp(1.75rem, 3vw, 2.65rem);
            font-weight: 800;
            line-height: 1;
            margin: .85rem 0 .2rem;
        }
        .metric-lg {
            color: #122321;
            font-size: clamp(2.1rem, 4vw, 3.6rem);
            font-weight: 800;
            line-height: .98;
        }
        .metric-label {
            color: var(--app-muted);
            font-size: .8rem;
            font-weight: 800;
            text-transform: uppercase;
        }
        .soft-stat {
            align-items: center;
            background: rgba(255, 255, 255, .58);
            border: 1px solid var(--app-line);
            border-radius: 8px;
            display: flex;
            gap: .7rem;
            padding: .9rem;
        }
        .chart-shell { height: 340px; position: relative; }
        .chart-shell.compact { height: 280px; }

        .table {
            --bs-table-bg: transparent;
            margin: 0;
        }
        .table thead th {
            background: rgba(20, 32, 31, .045);
            border-bottom: 1px solid var(--app-line);
            color: #55625f;
            font-size: .75rem;
            font-weight: 800;
            padding: .95rem 1rem;
            text-transform: uppercase;
        }
        .table tbody td, .table tbody th {
            border-color: rgba(20, 32, 31, .075);
            color: #243431;
            padding: .95rem 1rem;
            vertical-align: middle;
        }
        .table tbody tr {
            transition: background .18s ease, transform .18s ease;
        }
        .table-hover tbody tr:hover {
            background: rgba(15, 159, 122, .075);
        }
        .status-pill {
            align-items: center;
            background: rgba(15, 159, 122, .10);
            border: 1px solid rgba(15, 159, 122, .18);
            border-radius: 999px;
            color: var(--app-green-dark);
            display: inline-flex;
            font-size: .78rem;
            font-weight: 800;
            gap: .35rem;
            padding: .28rem .6rem;
            white-space: nowrap;
        }
        .muted-label { color: var(--app-muted); }
        .form-control {
            border: 1px solid rgba(20, 32, 31, .14);
            border-radius: 8px;
            min-height: 46px;
        }
        .form-control:focus {
            border-color: var(--app-green);
            box-shadow: 0 0 0 .2rem rgba(15, 159, 122, .14);
        }
        .form-label {
            color: #40504d;
            font-size: .82rem;
            font-weight: 800;
        }
        .fade-up {
            animation: fadeUp .55s ease both;
        }
        .fade-up:nth-child(2) { animation-delay: .06s; }
        .fade-up:nth-child(3) { animation-delay: .12s; }
        .fade-up:nth-child(4) { animation-delay: .18s; }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 991.98px) {
            .content-area { padding: 18px; }
            .navbar-nav { padding-top: .75rem; }
            .hero-inner { min-height: 230px; }
        }
        @media (max-width: 575.98px) {
            .content-area { padding: 12px; }
            .hero-actions .btn, .toolbar-actions .btn { width: 100%; }
            .brand-copy small { display: none; }
            .chart-shell, .chart-shell.compact { height: 250px; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
<div class="app-shell">
    <nav class="navbar navbar-expand-lg app-navbar">
        <div class="container-fluid px-3 px-lg-4">
            <a class="navbar-brand" href="/">
                <span class="brand-mark"><i class="bi bi-cloud-sun-fill"></i></span>
                <span class="brand-copy">Kigali Weather<small>Prediction intelligence</small></span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav mx-lg-auto mb-2 mb-lg-0 gap-lg-1">
                    <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/"><i class="bi bi-grid-1x2 me-1"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path|slice:':11' == '/predictor/' %}active{% endif %}" href="/predictor/"><i class="bi bi-stars me-1"></i>Predictor</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path|slice:':5' == '/api/' %}active{% endif %}" href="/api/"><i class="bi bi-braces me-1"></i>API</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path|slice:':18' == '/accounts/reports' %}active{% endif %}" href="/accounts/reports/predictions/"><i class="bi bi-graph-up-arrow me-1"></i>Reports</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/"><i class="bi bi-shield-lock me-1"></i>Admin</a></li>
                </ul>
                <div class="d-flex gap-2 align-items-center">
                    {% if user.is_authenticated %}
                        <span class="status-pill"><i class="bi bi-person-check"></i>{{ user.username }}</span>
                        <form method="post" action="/accounts/logout/" class="m-0">
                            {% csrf_token %}
                            <button class="btn btn-outline-secondary btn-sm btn-icon" type="submit"><i class="bi bi-box-arrow-right"></i>Logout</button>
                        </form>
                    {% else %}
                        <a class="btn btn-primary btn-sm btn-icon" href="/accounts/login/"><i class="bi bi-person"></i>Login</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="content-area">
        {% block content %}{% endblock %}
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        document.querySelectorAll("[data-countup]").forEach((node) => {
            const target = Number(node.dataset.countup);
            const suffix = node.dataset.suffix || "";
            const decimals = Number(node.dataset.decimals || 0);
            if (!Number.isFinite(target)) return;
            const duration = 850;
            const start = performance.now();
            const render = (now) => {
                const progress = Math.min((now - start) / duration, 1);
                const eased = 1 - Math.pow(1 - progress, 3);
                node.textContent = `${(target * eased).toFixed(decimals)}${suffix}`;
                if (progress < 1) requestAnimationFrame(render);
            };
            requestAnimationFrame(render);
        });
    });
</script>
{% block scripts %}{% endblock %}
</body>
</html>
