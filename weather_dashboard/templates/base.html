<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Kigali Weather Dashboard{% endblock %}</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@4.0.0-rc4/dist/css/adminlte.min.css">
    <style>
        body { background: #f4f6f9; }
        .app-shell { min-height: 100vh; }
        .navbar-brand { font-weight: 700; }
        .content-area { padding: 24px; }
        .metric { font-size: 2rem; font-weight: 700; line-height: 1.1; }
        .metric-lg { font-size: 2.4rem; font-weight: 700; line-height: 1.1; }
        .metric-label { color: #6c757d; font-size: .9rem; }
        .card { border-radius: 8px; }
        canvas { max-height: 320px; }
        .nav-link.active { font-weight: 700; }
        @media (max-width: 768px) {
            .content-area { padding: 16px; }
            .metric { font-size: 1.65rem; }
            .metric-lg { font-size: 2rem; }
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
<div class="app-shell">
    <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Kigali Weather</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav" aria-controls="mainNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="mainNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path|slice:':11' == '/predictor/' %}active{% endif %}" href="/predictor/">Predictor</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path|slice:':5' == '/api/' %}active{% endif %}" href="/api/">API</a></li>
                    <li class="nav-item"><a class="nav-link {% if request.path|slice:':18' == '/accounts/reports' %}active{% endif %}" href="/accounts/reports/predictions/">Reports</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/">Admin</a></li>
                </ul>
                <div class="d-flex gap-2 align-items-center">
                    {% if user.is_authenticated %}
                        <span class="text-muted small">{{ user.username }}</span>
                        <form method="post" action="/accounts/logout/">
                            {% csrf_token %}
                            <button class="btn btn-outline-secondary btn-sm" type="submit">Logout</button>
                        </form>
                    {% else %}
                        <a class="btn btn-outline-primary btn-sm" href="/accounts/login/">Login</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="content-area">
        {% block content %}{% endblock %}
    </main>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
