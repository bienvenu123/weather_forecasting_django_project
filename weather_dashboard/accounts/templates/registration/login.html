{% extends "base.html" %}

{% block title %}Login | Kigali Weather{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card card-outline card-primary">
            <div class="card-header text-center">
                <h1 class="mb-0">Weather Dashboard</h1>
            </div>
            <div class="card-body login-card-body">
                <p class="login-box-msg">Sign in to view reports</p>
                {% if form.errors %}
                    <div class="alert alert-danger">Invalid username or password.</div>
                {% endif %}
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label" for="{{ form.username.id_for_label }}">Username</label>
                        <input class="form-control" type="text" name="{{ form.username.html_name }}" id="{{ form.username.id_for_label }}" required autofocus>
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="{{ form.password.id_for_label }}">Password</label>
                        <input class="form-control" type="password" name="{{ form.password.html_name }}" id="{{ form.password.id_for_label }}" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
